name: Draft Release

# When a release PR merges into main (version in package.json changes),
# create a draft GitHub Release with the changelog section as notes.
# Publishing the draft (manual, one click) triggers publish.yml which
# packages the VSIX, publishes to the Marketplace, and announces on Discord.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create draft release if version is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi

          # Extract this version's section from CHANGELOG.md
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## \[/ { flag=0 }
            flag { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "$TAG" \
            --draft \
            --notes "$NOTES"

          echo "Draft release $TAG created. Publish it to ship to the Marketplace."
